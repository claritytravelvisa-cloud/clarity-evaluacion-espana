<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Evaluación Técnica España</title>

<style>
  body{
    font-family: Arial, sans-serif;
    background:#0A1F44;
    color:white;
    margin:0;
    padding:0;
    text-align:center;
  }
  .container{
    padding:60px 20px;
    max-width:800px;
    margin:auto;
  }
  h1{ font-size:38px; margin-bottom:20px; }
  p{ font-size:18px; line-height:1.6; margin-bottom:30px; }

  .button{
    background:#C7A86D;
    color:#0A1F44;
    padding:15px 30px;
    text-decoration:none;
    font-weight:bold;
    border-radius:8px;
    display:inline-block;
  }
  .button:hover{ opacity:0.9; }

  .status{
    margin-top:18px;
    font-size:14px;
    opacity:0.85;
  }
  .footer{
    margin-top:60px;
    font-size:14px;
    opacity:0.7;
  }
</style>
</head>

<body>
<div class="container">
  <h1>Evaluación Técnica de Expediente</h1>

  <p>
    Regularización en España<br>
    Análisis profesional de tu caso migratorio por €89.
  </p>

  <a id="ctaBtn" class="button" href="#" target="_blank" rel="noopener">Cargando...</a>
  <div id="statusText" class="status"></div>

  <div class="footer">Clarity Travel & Visa ©️ 2026</div>
</div>

<script>
  const ENDPOINT = "https://script.google.com/macros/s/AKfycbxixfTnK1KBYUVLr_rPL98E5SFQ03VhcjJsBqH2hasaQ_datYyzq7VQannvY1qDZVdl/exec";
  const CALENDAR_URL = "https://calendar.app.google/wKLMMgWJkpnymVLY9";
  const WAITLIST_FALLBACK = "https://docs.google.com/forms/d/e/1FAIpQLScCFtPDUncoHINpTFGuSnVwbdugP0QrEKG6D5PdgYEaNAzC5g/viewform?usp=header";

  const btn = document.getElementById("ctaBtn");
  const statusText = document.getElementById("statusText");

  async function loadStatus(){
    try{
      const res = await fetch(ENDPOINT + "?t=" + Date.now(), { cache: "no-store" });
      const data = await res.json();

      const open = (data.open === true || data.open === "true");

      if(open){
        btn.textContent = data.ctaText || "Reservar";
        btn.href = CALENDAR_URL;
        statusText.textContent = data.statusText || "Cupos disponibles";
      } else {
        btn.textContent = data.ctaText || "Lista de espera";
        btn.href = (data.waitlistUrl && String(data.waitlistUrl).includes("docs.google.com/forms"))
          ? data.waitlistUrl
          : WAITLIST_FALLBACK;
        statusText.textContent = data.statusText || "Cupos llenos";
      }

    } catch (e){
      // respaldo si falla el endpoint
      btn.textContent = "Reservar";
      btn.href = CALENDAR_URL;
      statusText.textContent = "No se pudo verificar disponibilidad.";
    }
  }

  loadStatus();
</script>
</body>
</html>
