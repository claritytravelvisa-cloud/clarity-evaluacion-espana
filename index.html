<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evaluación Técnica de Expediente</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#061a3a;
      color:#fff;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:32px 16px;
    }
    .wrap{max-width:980px; width:100%;}
    h1{
      font-size:clamp(34px, 5vw, 60px);
      margin:0 0 10px;
      font-weight:800;
    }
    h2{
      margin:0;
      font-size:clamp(18px, 2.4vw, 28px);
      font-weight:600;
      opacity:.95;
    }
    p{
      margin:10px 0 6px;
      font-size:16px;
      opacity:.95;
    }
    .button{
      margin-top:14px;
      background:#c7a86d;
      color:#061a3a;
      border:none;
      border-radius:10px;
      padding:16px 28px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }
    .button[disabled]{opacity:.65; cursor:not-allowed;}
    footer{margin-top:24px; opacity:.85; font-size:14px;}
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Evaluación Técnica de Expediente</h1>
    <h2>Regularización en España</h2>
    <p>Análisis profesional de tu caso migratorio por €89.</p>

    <p id="statusText">Cargando disponibilidad…</p>

    <button id="ctaBtn" class="button" type="button" disabled>...</button>

    <footer>Clarity Travel &amp; Visa ©️ 2026</footer>
  </div>

  <script>
    // ✅ Pega aquí tu URL final del Worker, EJ:
    // const STATUS_URL = "https://tight-thunder-a0dc.claritytravelvisa.workers.dev/status";
    const STATUS_URL = "lingering-star-d1cc.claritytravelvisa.workers.dev";

    function applyStatus(data){
      const statusEl = document.getElementById("statusText");
      const btn = document.getElementById("ctaBtn");

      statusEl.textContent = data.statusText || "";

      btn.textContent = data.ctaText || "Reservar";
      btn.disabled = false;

      btn.onclick = function(){
        const url = data.open ? data.calendarUrl : data.waitlistUrl;
        if (url) window.open(url, "_blank");
      };
    }

    async function loadStatus(){
      const statusEl = document.getElementById("statusText");
      const btn = document.getElementById("ctaBtn");

      statusEl.textContent = "Cargando disponibilidad…";
      btn.disabled = true;
      btn.textContent = "...";

      try{
        const res = await fetch(STATUS_URL + "?_=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        applyStatus(data);
      } catch(e){
        statusEl.textContent = "No se pudo cargar disponibilidad.";
        btn.disabled = false;
        btn.textContent = "Reintentar";
        btn.onclick = loadStatus;
      }
    }

    window.addEventListener("load", loadStatus);
  </script>
</body>
</html>
