<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación Técnica España</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0A1F44;
      color:white;
      margin:0;
      padding:0;
      text-align:center;
    }
    .container{
      padding:60px 20px;
      max-width:800px;
      margin:auto;
    }
    h1{
      font-size:38px;
      margin-bottom:20px;
    }
    p{
      font-size:18px;
      line-height:1.6;
      margin-bottom:30px;
    }
    .status{
      margin: 10px 0 20px;
      font-weight: bold;
      opacity: .95;
    }
    .button{
      background:#C7A86D;
      color:#0A1F44;
      padding:15px 30px;
      text-decoration:none;
      font-weight:bold;
      border-radius:8px;
      display:inline-block;
      cursor:pointer;
      border:none;
      font-size:16px;
    }
    .button:hover{ opacity:0.9; }
    .button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .footer{
      margin-top:60px;
      font-size:14px;
      opacity:0.7;
    }
    .small{
      margin-top:14px;
      font-size:14px;
      opacity:.75;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Evaluación Técnica de Expediente</h1>

    <p>
      Regularización en España<br>
      Análisis profesional de tu caso migratorio por €89.
    </p>

    <div id="statusText" class="status">Cargando disponibilidad…</div>

    <button id="ctaBtn" class="button" disabled>
      Cargando…
    </button>

    <div id="helperText" class="small"></div>

    <div class="footer">
      Clarity Travel & Visa ©️ 2026
    </div>
  </div>

  <script>
    const STATUS_ENDPOINT = "https://script.google.com/macros/s/AKfycbydBLCNSfthkb0dq8oFx1FtIZd5uzVCmn3qIJTl15gc7jIGNmxA6LyCpPajMoX_HQty/exec";

    function applyStatus(data){
      const statusEl = document.getElementById("statusText");
      const btn = document.getElementById("ctaBtn");
      const helper = document.getElementById("helperText");

      const open = !!data.open;

      statusEl.textContent = data.statusText;
      btn.textContent = data.ctaText;

      const targetUrl = open ? data.calendarUrl : data.waitlistUrl;

      btn.disabled = !targetUrl;

      helper.textContent = open
        ? "Al reservar, se abrirá el calendario para elegir tu horario."
        : "Cupos llenos. Únete a la lista de espera y te contactamos cuando haya cupo.";

      btn.onclick = () => {
        if (!targetUrl) return;
        window.location.href = targetUrl;
      };
    }

    async function loadStatus(){
      try{
        const res = await fetch(STATUS_ENDPOINT, { cache: "no-store" });
        if(!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        applyStatus(data);
      }catch(err){
        document.getElementById("statusText").textContent = "No se pudo cargar disponibilidad.";
        const btn = document.getElementById("ctaBtn");
        btn.disabled = false;
        btn.textContent = "Reintentar";
        btn.onclick = loadStatus;
        console.error(err);
      }
    }

    loadStatus();
  </script>
</body>
</html>
