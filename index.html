<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación Técnica España</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0A1F44;
      color:white;
      margin:0;
      padding:0;
      text-align:center;
    }

    .container{
      padding:60px 20px;
      max-width:800px;
      margin:auto;
    }

    h1{
      font-size:38px;
      margin-bottom:20px;
    }

    p{
      font-size:18px;
      line-height:1.6;
      margin-bottom:20px;
    }

    .button{
      background:#C7A86D;
      color:#0A1F44;
      padding:15px 30px;
      text-decoration:none;
      font-weight:bold;
      border-radius:8px;
      display:inline-block;
      border:none;
      cursor:pointer;
    }

    .button:hover{
      opacity:0.9;
    }

    .footer{
      margin-top:60px;
      font-size:14px;
      opacity:0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Evaluación Técnica de Expediente</h1>

    <p>
      Regularización en España<br>
      Análisis profesional de tu caso migratorio por €89.
    </p>

    <!-- ✅ ESTADO (CUPOS DISPONIBLES / CUPOS LLENOS) -->
    <p id="statusText">Cargando disponibilidad...</p>

    <!-- ✅ BOTÓN -->
    <button id="ctaBtn" class="button" type="button" disabled>...</button>

    <div class="footer">
      Clarity Travel & Visa ©️ 2026
    </div>
  </div>

  <!-- ✅ SCRIPT (JSONP) -->
  <script>
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbydBLCNSfthkb0dq8oFx1FtIZd5uzVCmn3qIJTl15gc7jIGNmxA6LyCpPajMoX_HQty/exec";

    function applyStatus(data){
      // texto
      document.getElementById("statusText").textContent = data.statusText || "";

      // botón
      const btn = document.getElementById("ctaBtn");
      btn.textContent = data.ctaText || "Reservar";
      btn.disabled = false;

      // destino según cupos
      btn.onclick = function(){
        const url = data.open ? data.calendarUrl : data.waitlistUrl;
        if (url) window.open(url, "_blank");
      };
    }

    function loadStatus(){
      // mensaje mientras carga
      document.getElementById("statusText").textContent = "Cargando disponibilidad…";

      // borra script anterior
      var old = document.getElementById("jsonpScript");
      if (old && old.parentNode) old.parentNode.removeChild(old);

      // crea JSONP
      var s = document.createElement("script");
      s.id = "jsonpScript";
      s.src = ENDPOINT + "?callback=applyStatus&_=" + Date.now();

      // si falla cargar el script
      s.onerror = function(){
        document.getElementById("statusText").textContent = "No se pudo cargar disponibilidad.";
      };

      document.body.appendChild(s);
    }

    // Carga al abrir
    window.addEventListener("load", loadStatus);
  </script>
</body>
</html>
