<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evaluación Técnica de Expediente</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#061a3a;
      color:#fff;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:32px 16px;
    }
    .wrap{max-width:980px; width:100%;}
    h1{
      font-size:clamp(34px, 5vw, 60px);
      margin:0 0 10px;
      font-weight:800;
    }
    h2{
      margin:0;
      font-size:clamp(18px, 2.4vw, 28px);
      font-weight:600;
      opacity:.95;
    }
    p{
      margin:10px 0 6px;
      font-size:16px;
      opacity:.95;
    }
    .button{
      margin-top:14px;
      background:#c7a86d;
      color:#061a3a;
      border:none;
      border-radius:10px;
      padding:16px 28px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }
    .button[disabled]{opacity:.65; cursor:not-allowed;}
    footer{margin-top:24px; opacity:.85; font-size:14px;}
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Evaluación Técnica de Expediente</h1>
    <h2>Regularización en España</h2>
    <p>Análisis profesional de tu caso migratorio por €89.</p>

    <p id="statusText">Cargando disponibilidad…</p>

    <button id="ctaBtn" class="button" type="button" disabled>...</button>

    <footer>Clarity Travel &amp; Visa ©️ 2026</footer>
  </div>

  <script>
    const ENDPOINT = "https://lingering-star-d1cc.claritytravelvisa.workers.dev";

    async function loadCupos() {
      const statusEl = document.getElementById("statusText");
      const btn = document.getElementById("ctaBtn");

      try {
        const res = await fetch(ENDPOINT, { cache: "no-store" });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();

        const max = Number(data.cuposMax ?? 0);
        const ocupados = Number(data.cuposOcupados ?? 0);
        const open = Boolean(data.open);
        const cuposDisponibles = open && ocupados < max;

        statusEl.textContent = cuposDisponibles
          ? (data.statusText || "Cupos disponibles")
          : "Cupos llenos";

        btn.disabled = false;

        if (cuposDisponibles) {
          btn.textContent = data.ctaText || "Reservar";
          btn.onclick = () => window.location.href = (data.calendarUrl || "#");
        } else {
          btn.textContent = "Lista de espera";
          const url = data.waitlistUrl || "";
          btn.onclick = () => url ? window.location.href = url : null;
          if (!url) btn.disabled = true;
        }

      } catch (err) {
        statusEl.textContent = "No se pudo cargar disponibilidad.";
        btn.textContent = "Reintentar";
        btn.disabled = false;
        btn.onclick = () => loadCupos();
        console.error(err);
      }
    }

    loadCupos();
  </script>

</body>
</html>
