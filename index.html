<script>
  const ENDPOINT = "https://script.google.com/macros/s/AKfycbxixfTnK1KBYUVLr_rPL98E5SFQ03VhcjJsBqH2hasaQ_datYyzq7VQannvY1qDZVdl/exec";
  const BOOKING_URL = "https://calendar.app.google/wKLMMgWJkpnymVLY9";

  const btn = document.getElementById("ctaBtn");
  const statusEl = document.getElementById("statusText");

  async function loadStatus(){
    try{
      const res = await fetch(ENDPOINT);
      const data = await res.json();

      statusEl.textContent = data.statusText;

      if (data.open) {
        btn.textContent = data.ctaText;
        btn.href = BOOKING_URL;
      } else {
        btn.textContent = data.ctaText;
        btn.href = data.waitlistUrl;
      }
    } catch (e){
      statusEl.textContent = "Error al cargar disponibilidad";
      btn.textContent = "Intentar nuevamente";
      btn.href = "#";
    }
  }

  loadStatus();
</script>
