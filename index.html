<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación Técnica de Expediente</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#0A1F44;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
padding:20px;
}

.container{
max-width:800px;
width:100%;
}

h1{
font-size:42px;
margin-bottom:20px;
}

p{
font-size:18px;
line-height:1.6;
margin-bottom:25px;
}

.status{
margin-bottom:25px;
font-weight:bold;
font-size:18px;
}

.button{
background:#C7A86D;
color:#0A1F44;
padding:15px 30px;
text-decoration:none;
font-weight:bold;
border-radius:8px;
display:inline-block;
cursor:pointer;
border:none;
font-size:16px;
}

.button:hover{
opacity:0.9;
}

.footer{
margin-top:50px;
font-size:14px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>Evaluación Técnica de Expediente</h1>

<p>
Regularización en España<br>
Análisis profesional de tu caso migratorio por €89.
</p>

<div id="statusText" class="status">
Cargando disponibilidad...
</div>

<a id="ctaBtn" href="#" class="button">
Cargando...
</a>

<div class="footer">
Clarity Travel & Visa ©️ 2026
</div>

</div>

<script>
/* 🔴 NO TOCAR ESTA URL */
const ENDPOINT = "https://script.google.com/macros/s/AKfycbwfxT-Izg_pgSPR2mAwBMT-S9fyLTEis91K2waehk7CKaGxR0ok1MazQhqO11_q9Wc/exec";

/* Esta función la llama el Apps Script (JSONP) */
function handleLandingStatus(data){
  const statusEl = document.getElementById("statusText");
  const btn = document.getElementById("ctaBtn");

  if(!data){
    statusEl.textContent = "No se pudo cargar disponibilidad.";
    btn.textContent = "Reintentar";
    btn.onclick = loadStatus;
    return;
  }

  statusEl.textContent = data.statusText;
  btn.textContent = data.ctaText;

  const url = data.open ? data.calendarUrl : data.waitlistUrl;

  btn.onclick = function(){
    if(url){
      window.open(url, "_blank");
    }
  };
}

/* Carga el endpoint como <script> (evita CORS) */
<script>
function loadStatus(){
  // borra script anterior sin usar .remove()
  var old = document.getElementById("jsonpScript");
  if (old && old.parentNode) old.parentNode.removeChild(old);

  // crea el <script> JSONP
  var s = document.createElement("script");
  s.id = "jsonpScript";
  s.src = ENDPOINT + "&_=" + new Date().getTime();
  s.async = true;

  s.onerror = function(){
    document.getElementById("statusText").textContent = "No se pudo cargar disponibilidad.";
    var btn = document.getElementById("ctaBtn");
    btn.textContent = "Reintentar";
    btn.onclick = loadStatus;
  };

  document.body.appendChild(s);
}
</script>
