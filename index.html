<<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evaluación Técnica de Expediente</title>
  <style>
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:#071a34; color:#fff; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
    }
    .wrap{ width:min(900px, 92vw); text-align:center; padding:40px 10px; }
    h1{ font-size: clamp(28px, 4vw, 44px); margin:0 0 14px; font-weight:800; }
    .sub{ opacity:.92; font-size: clamp(16px, 2.2vw, 20px); margin:0 0 6px; }
    .sub2{ opacity:.9; font-size: clamp(14px, 2vw, 18px); margin:0 0 26px; }
    #statusText{ margin:18px 0 18px; font-weight:700; opacity:.95; }
    .btn{
      display:inline-block; padding:14px 26px; border-radius:10px;
      background:#c7a86d; color:#0a1f44; font-weight:800; text-decoration:none;
      border:none; cursor:pointer; font-size:16px;
    }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }
    .mini{ margin-top:18px; opacity:.7; font-size:13px; }
    .err{ color:#ffd7d7; opacity:1; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Evaluación Técnica de Expediente</h1>
    <div class="sub">Regularización en España</div>
    <div class="sub2">Análisis profesional de tu caso migratorio por €89.</div>

    <div id="statusText">Cargando disponibilidad…</div>

    <button id="ctaBtn" class="btn" disabled>Reintentar</button>

    <div class="mini">Clarity Travel &amp; Visa ©️ 2026</div>
  </div>

  <script>
    // ✅ Pega aquí tu URL EXEC:
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbx9QoPUGpaumgvH-ssHA8mnDsu6hCYte-k67Nl41Vz7l8qi8dXYlvpUECwJyw-Pocs3/exec";

    const statusEl = document.getElementById("statusText");
    const btn = document.getElementById("ctaBtn");

    function setError(msg){
      statusEl.textContent = msg;
      statusEl.classList.add("err");
      btn.disabled = false;
      btn.textContent = "Reintentar";
      btn.onclick = () => loadStatus();
    }

    // ✅ Esta función la llama el JSONP
    window.handleLandingStatus = function (data) {
      try{
        // Limpia estado de error
        statusEl.classList.remove("err");

        const open = !!data.open;
        const ctaText = data.ctaText || (open ? "Reservar" : "Lista de espera");
        const statusText = data.statusText || (open ? "Cupos disponibles" : "Cupos llenos");

        statusEl.textContent = statusText;

        btn.disabled = false;
        btn.textContent = ctaText;

        // Decide a dónde ir al hacer click
        const url = open ? (data.calendarUrl || "") : (data.waitlistUrl || "");

        btn.onclick = () => {
          if (!url) return setError("Falta el enlace (calendarUrl / waitlistUrl).");
          window.location.href = url;
        };

      } catch (e){
        console.error(e);
        setError("No se pudo procesar la respuesta.");
      }
    };

    function loadStatus(){
      // Deshabilita mientras carga
      btn.disabled = true;
      btn.textContent = "Cargando…";
      statusEl.classList.remove("err");
      statusEl.textContent = "Cargando disponibilidad…";

      // JSONP: crea un <script> hacia Apps Script (evita CORS)
      const s = document.createElement("script");
      const sep = ENDPOINT.includes("?") ? "&" : "?";
      s.src = ENDPOINT + sep + "callback=handleLandingStatus&_ts=" + Date.now();
      s.async = true;

      s.onerror = () => setError("No se pudo cargar disponibilidad.");
      document.body.appendChild(s);

      // limpia el script luego de cargar (no ensuciar DOM)
      s.onload = () => setTimeout(() => s.remove(), 1000);
    }

    // primer load
    loadStatus();
  </script>
</body>
</html>
