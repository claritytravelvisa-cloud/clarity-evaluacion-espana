<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación Técnica España</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0A1F44;
      color:white;
      margin:0;
      padding:0;
      text-align:center;
    }

    .container{
      padding:60px 20px;
      max-width:800px;
      margin:auto;
    }

    h1{
      font-size:38px;
      margin-bottom:20px;
    }

    p{
      font-size:18px;
      line-height:1.6;
      margin-bottom:20px;
    }

    .status{
      font-size:14px;
      opacity:0.85;
      margin-bottom:25px;
    }

    .button{
      background:#C7A86D;
      color:#0A1F44;
      padding:15px 30px;
      text-decoration:none;
      font-weight:bold;
      border-radius:8px;
      display:inline-block;
      cursor:pointer;
    }

    .button:hover{ opacity:0.9; }

    .footer{
      margin-top:60px;
      font-size:14px;
      opacity:0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Evaluación Técnica de Expediente</h1>

    <p>
      Regularización en España<br>
      Análisis profesional de tu caso migratorio por €89.
    </p>

    <div id="statusText" class="status">Verificando disponibilidad…</div>

    <a id="ctaBtn" class="button" href="#" target="_blank" rel="noopener">
      Cargando…
    </a>

    <div class="footer">
      Clarity Travel & Visa ©️ 2026
    </div>
  </div>

  <script>
    // === TUS LINKS (YA PUESTOS) ===
    const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbxixfTnK1KBYUVLr_rPL98E5SFQ03VhcjJsBqH2hasaQ_datYyzq7VQannvY1qDZVdl/exec";
    const CALENDAR_URL  = "https://calendar.app.google/wKLMMgWJkpnymVLY9";

    // JSONP callback (Apps Script devuelve: handleLandingStatus({...}))
    function handleLandingStatus(data){
      const statusEl = document.getElementById("statusText");
      const btn = document.getElementById("ctaBtn");

      const open = !!data.open;
      const ctaText = data.ctaText || (open ? "Reservar" : "Lista de espera");
      const statusText = data.statusText || (open ? "Cupos disponibles" : "Cupos llenos");
      const waitlistUrl = data.waitlistUrl || "#";

      statusEl.textContent = statusText;

      btn.textContent = ctaText;

      // Si open=true -> calendario. Si open=false -> formulario lista de espera.
      btn.href = open ? CALENDAR_URL : waitlistUrl;
    }

    // Carga JSONP para evitar CORS
    (function loadStatus(){
      const s = document.createElement("script");
      s.src = ENDPOINT_URL + "?callback=handleLandingStatus&_=" + Date.now();
      s.onerror = function(){
        // Fallback si algo falla: manda a calendario
        document.getElementById("statusText").textContent = "No se pudo verificar disponibilidad.";
        const btn = document.getElementById("ctaBtn");
        btn.textContent = "Reservar";
        btn.href = CALENDAR_URL;
      };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
