<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evaluación Técnica España</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0A1F44;
  color:white;
  text-align:center;
}
.container{
  padding:60px 20px;
  max-width:800px;
  margin:auto;
}
h1{font-size:40px;margin-bottom:10px;}
p{font-size:18px;margin-bottom:20px;}
.button{
  background:#C7A86D;
  color:#0A1F44;
  padding:15px 30px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.button[disabled]{opacity:.6;cursor:not-allowed;}
.footer{margin-top:40px;font-size:14px;opacity:.7;}
</style>
</head>

<body>

<div class="container">
<h1>Evaluación Técnica de Expediente</h1>
<p>Regularización en España<br>Análisis profesional por €89.</p>

<p id="statusText">Cargando disponibilidad...</p>

<button id="ctaBtn" class="button" disabled>...</button>

<div class="footer">Clarity Travel & Visa ©️ 2026</div>
</div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbyH6dfNJBCHXD2lV1Og0K1Bs4eljy-N7bC2cDIvbBEvM2gkxG_gVVxeh_B0uSGNDlkP/exec";

function applyStatus(data){
  const statusEl = document.getElementById("statusText");
  const btn = document.getElementById("ctaBtn");

  statusEl.textContent = data.statusText || "";
  btn.textContent = data.ctaText || "Reservar";
  btn.disabled = false;

  btn.onclick = function(){
    const url = data.open ? data.calendarUrl : data.waitlistUrl;
    if (url) window.open(url, "_blank");
  };
}

function loadStatus(){
  document.getElementById("statusText").textContent = "Cargando disponibilidad...";

  var old = document.getElementById("jsonpScript");
  if (old && old.parentNode) old.parentNode.removeChild(old);

  var s = document.createElement("script");
  s.id = "jsonpScript";
  s.src = ENDPOINT + "?callback=applyStatus&_=" + Date.now();

  s.onerror = function(){
    document.getElementById("statusText").textContent = "No se pudo cargar disponibilidad.";
  };

  document.body.appendChild(s);
}

window.addEventListener("load", loadStatus);
</script>

</body>
</html>
