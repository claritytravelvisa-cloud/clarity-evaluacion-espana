<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evaluación Técnica de Expediente</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#061a3a;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:32px 16px;
    }
    .wrap{ max-width: 980px; width:100%; }
    h1{ font-size: clamp(34px, 5vw, 60px); margin: 0 0 10px; font-weight: 800; }
    h2{ font-size: clamp(18px, 2.4vw, 28px); margin: 0 0 6px; font-weight: 600; opacity: .95; }
    p{ margin: 10px 0; opacity: .95; }
    .button{
      margin-top:14px;
      background:#c7a86d;
      color:#1b1b1b;
      border:none;
      border-radius:10px;
      padding:14px 26px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }
    .button[disabled]{ opacity:.65; cursor:not-allowed; }
    footer{ margin-top:24px; opacity:.85; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Evaluación Técnica de Expediente</h1>
    <h2>Regularización en España</h2>
    <p>Análisis profesional de tu caso migratorio por €89.</p>

    <p id="statusText">Cargando disponibilidad…</p>

    <!-- OJO: SIN onclick aquí -->
    <button id="ctaBtn" class="button" type="button" disabled>...</button>

    <footer>Clarity Travel &amp; Visa ©️ 2026</footer>
  </div>

  <script>
    // TU ENDPOINT (el que me diste)
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbx9QoPUGpaumgvH-ssHA8mnDsu6hCYte-k67Nl41Vz7l8qi8dXYlvpUECwJyw-Pocs3/exec";

    function applyStatus(data){
      const statusEl = document.getElementById("statusText");
      const btn = document.getElementById("ctaBtn");

      statusEl.textContent = data.statusText || "";

      btn.textContent = data.ctaText || "Reservar";
      btn.disabled = false;

      btn.onclick = function(){
        const url = data.open ? data.calendarUrl : data.waitlistUrl;
        if (url) window.open(url, "_blank");
      };
    }

    function loadStatus(){
      const statusEl = document.getElementById("statusText");
      statusEl.textContent = "Cargando disponibilidad…";

      // borrar script anterior
      var old = document.getElementById("jsonpScript");
      if (old && old.parentNode) old.parentNode.removeChild(old);

      // crear JSONP
      var s = document.createElement("script");
      s.id = "jsonpScript";
      s.src = ENDPOINT + "?callback=applyStatus&_=" + Date.now();

      s.onerror = function(){
        statusEl.textContent = "No se pudo cargar disponibilidad.";
        const btn = document.getElementById("ctaBtn");
        btn.textContent = "Reintentar";
        btn.disabled = false;
        btn.onclick = loadStatus; // reintenta con JSONP (sin fetch)
      };

      document.body.appendChild(s);
    }

    window.addEventListener("load", loadStatus);
  </script>
</body>
</html>
