<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Evaluación Técnica de Expediente</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#071b3a;color:#fff;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
    .card{max-width:720px;width:100%;text-align:center}
    h1{font-size:44px;line-height:1.05;margin:0 0 10px}
    .sub{opacity:.9;margin:0 0 18px;font-size:18px}
    .status{margin:18px 0 18px;font-weight:600}
    .btn{display:inline-block;background:#c7a86d;color:#111;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:700}
    .muted{opacity:.75;margin-top:14px}
    .footer{opacity:.75;margin-top:26px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Evaluación Técnica de Expediente</h1>
    <p class="sub">Regularización en España<br/>Análisis profesional de tu caso migratorio por €89.</p>

    <div id="statusText" class="status">Cargando disponibilidad...</div>

    <a id="ctaBtn" class="btn" href="#" target="_blank" rel="noopener">Cargando…</a>

    <div class="footer">Clarity Travel & Visa ©️ 2026</div>
  </div>

<script>
  // ✅ Pega aquí tu /exec NUEVA (la copiada del Deploy)
  const EXEC_URL = "https://script.google.com/macros/s/AKfycbyIn8uSGE1Ghr3As5zEhGxDkjvWILo_mFOk0dveXSZsI6ObUPFiDYgY9IPomvl09Dil/exec";

  function handleLandingStatus(data){
    const statusEl = document.getElementById("statusText");
    const btn = document.getElementById("ctaBtn");

    if(!data){
      statusEl.textContent = "No se pudo cargar disponibilidad.";
      btn.textContent = "Reintentar";
      btn.href = location.href;
      return;
    }

    statusEl.textContent = data.statusText || "Estado no disponible";

    const open = !!data.open;
    btn.textContent = data.ctaText || (open ? "Reservar" : "Lista de espera");

    const url = open ? data.calendarUrl : data.waitlistUrl;
    btn.href = url || "#";
  }

  function loadStatus(){
    // JSONP para evitar CORS: inyecta <script src="...&callback=handleLandingStatus">
    const s = document.createElement("script");
    s.src = EXEC_URL + "?callback=handleLandingStatus&_=" + Date.now();
    s.onerror = function(){
      handleLandingStatus(null);
    };
    document.body.appendChild(s);
  }

  loadStatus();
</script>
</body>
</html>
