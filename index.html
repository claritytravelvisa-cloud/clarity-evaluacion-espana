<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evaluación Técnica de Expediente</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#061a3a;
      color:#fff;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:32px 16px;
    }
    .wrap{max-width:980px; width:100%;}
    h1{
      font-size:clamp(34px, 5vw, 60px);
      margin:0 0 10px;
      font-weight:800;
    }
    h2{
      margin:0;
      font-size:clamp(18px, 2.4vw, 28px);
      font-weight:600;
      opacity:.95;
    }
    p{
      margin:10px 0 6px;
      font-size:16px;
      opacity:.95;
    }
    .button{
      margin-top:14px;
      background:#c7a86d;
      color:#061a3a;
      border:none;
      border-radius:10px;
      padding:16px 28px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }
    .button[disabled]{opacity:.65; cursor:not-allowed;}
    footer{margin-top:24px; opacity:.85; font-size:14px;}
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Evaluación Técnica de Expediente</h1>
    <h2>Regularización en España</h2>
    <p>Análisis profesional de tu caso migratorio por €89.</p>

    <p id="statusText">Cargando disponibilidad…</p>

    <button id="ctaBtn" class="button" type="button" disabled>...</button>

    <footer>Clarity Travel &amp; Visa ©️ 2026</footer>
  </div>

  <script>
    <script>
  const ENDPOINT = "lingering-star-d1cc.claritytravelvisa.workers.dev"; // <- pega aquí el workers.dev (el que ya abre y muestra JSON)

  async function loadCupos() {
    const res = await fetch(ENDPOINT, { cache: "no-store" });
    const data = await res.json();

    const statusEl = document.getElementById("statusText");
    const btn = document.getElementById("ctaBtn");

    const max = Number(data.cuposMax || 0);
    const ocupados = Number(data.cuposOcupados || 0);
    const open = Boolean(data.open);
    const cuposDisponibles = open && ocupados < max;

    statusEl.textContent = cuposDisponibles ? (data.statusText || "Cupos disponibles") : "Cupos llenos";

    if (cuposDisponibles) {
      btn.textContent = data.ctaText || "Reservar";
      btn.href = data.calendarUrl || "#";
      btn.style.pointerEvents = "auto";
      btn.style.opacity = "1";
    } else {
      btn.textContent = "Lista de espera";
      btn.href = data.waitlistUrl || "#";
      btn.style.pointerEvents = btn.href === "#" ? "none" : "auto";
      btn.style.opacity = btn.href === "#" ? "0.6" : "1";
    }
  }

  loadCupos();
</script>
